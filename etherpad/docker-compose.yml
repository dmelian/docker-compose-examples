version: "3.9"

# =============================================================
#  Etherpad  — Editor colaborativo en tiempo real
#  Ejemplo para FP / Docker — Primer curso
# =============================================================
#
#  INICIO RÁPIDO:
#    docker compose up -d
#    Abrir navegador: http://localhost:9001
#
#  PARAR:
#    docker compose down
#
#  PARAR Y BORRAR DATOS:
#    docker compose down -v
# =============================================================

services:

  etherpad:
    image: etherpad/etherpad:latest
    container_name: etherpad
    restart: unless-stopped
    ports:
      - "9001:9001"           # http://localhost:9001
    environment:
      # Contraseña del panel de administración
      # http://localhost:9001/admin
      ADMIN_PASSWORD: "admin1234"
      ADMIN_USER: "admin"

      # Título que aparece en la web
      TITLE: "Etherpad - Clase Docker"

      # Color de fondo del skin (opcional, para personalizarlo)
      DEFAULT_PAD_TEXT: "Bienvenido al pad colaborativo. Escribe aquí con tus compañeros en tiempo real 🚀"

      # Base de datos: por defecto usa dirtyDB (fichero local)
      # Perfecto para desarrollo y aula — sin BD externa necesaria
      DB_TYPE: "dirty"
      DB_FILENAME: "/opt/etherpad-lite/var/dirty.db"

      # Desactivar minificación para ver mejor el tráfico en DevTools
      MINIFY: "false"

      # Permitir importar/exportar documentos
      REQUIRE_AUTHENTICATION: "false"

    volumes:
      - etherpad_data:/opt/etherpad-lite/var   # pads y base de datos

    networks:
      - etherpad_net

# =============================================================
#  VOLÚMENES
# =============================================================
volumes:
  etherpad_data:
    name: etherpad_data

# =============================================================
#  RED
# =============================================================
networks:
  etherpad_net:
    name: etherpad_net
    driver: bridge
